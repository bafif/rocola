# Configuración de video de la rocola.
# La setea el instalador (o se edita a mano). Valores:
#   MODE = auto   -> usa EDID si está disponible; si no, VGA seguro
#   MODE = vga    -> fuerza modos VGA/moderno estándar (31 kHz+)
#   MODE = crt15  -> fuerza modelines de 15 kHz (CRT arcade/TV)
MODE=auto

# Estándar de TV para 15 kHz (afecta refresh): ntsc (60 Hz) | pal (50 Hz)
TV_STANDARD=ntsc

# Resolución preferida (vacío = decide rocola-display-setup según MODE)
#   ej. CRT: 640x480  | VGA: 800x600 / 1024x768
PREFERRED_RES=
