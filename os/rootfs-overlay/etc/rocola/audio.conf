# Configuración de salida de audio de la rocola.
# La aplica al arrancar 'rocola-audio-default' (dentro de la sesión gráfica) y la
# reescribe el menú "Salida de audio" de la app cuando elegís otra salida.
#
# El audio rutea por PipeWire; "salida" = el *sink* de PipeWire por defecto. Cubre
# analógica, HDMI/DisplayPort, USB y Bluetooth (A2DP) con el mismo mecanismo.
#
#   OUTPUT = auto    -> heurística: Bluetooth conectado -> USB -> analógica -> HDMI
#                       -> primer sink disponible.
#   OUTPUT = <texto> -> fija el primer sink de PipeWire cuyo nombre CONTENGA <texto>.
#                       Ejemplos: usb | analog | hdmi | bluez | o un nombre exacto
#                       de `pactl list short sinks` (p. ej. alsa_output.usb-...).
OUTPUT=auto

# Volumen inicial del sink elegido (0-100).
VOLUME=80
