# MPD — configuración de la rocola.
music_directory     "/music"
playlist_directory  "/var/lib/mpd/playlists"
db_file             "/var/lib/mpd/tag_cache"
state_file          "/var/lib/mpd/state"
sticker_file        "/var/lib/mpd/sticker.sql"

user                "mpd"
bind_to_address     "127.0.0.1"
port                "6600"

# Re-escaneo automático de cambios en /music (import desde USB, etc.)
auto_update         "yes"
auto_update_depth   "0"

input {
    plugin "curl"
}

# Salida ALSA (default del sistema). En PCs con varias placas, fijar 'device'.
audio_output {
    type    "alsa"
    name    "Salida ALSA"
    mixer_type "software"
}

# Carátulas embebidas / archivos cover.* (lo usa la UI vía readpicture/albumart)
