# MPD — configuración de la rocola.
#
# IMPORTANTE: MPD NO corre como servicio del sistema. Lo lanza la sesión gráfica de
# 'rocola' (ver /usr/local/bin/rocola-session) para compartir el PipeWire de esa
# sesión. Por eso NO se fija 'user' acá: hereda el usuario que lo lanza (rocola).
# El ruteo a placas/Bluetooth lo decide PipeWire/WirePlumber; MPD sólo reproduce al
# "sink" por defecto de PipeWire. La salida se elige por heurística al boot y se
# cambia desde el menú de la app (no togglea salidas de MPD: cambia el sink default).
music_directory     "/music"
# Estado/DB de MPD: rutas escribibles por 'rocola' (MPD ya no corre como user 'mpd',
# así que /var/lib/mpd —owner mpd— no sirve). El directorio lo crea el Dockerfile.
playlist_directory  "/var/lib/rocola-mpd/playlists"
db_file             "/var/lib/rocola-mpd/tag_cache"
state_file          "/var/lib/rocola-mpd/state"
sticker_file        "/var/lib/rocola-mpd/sticker.sql"

bind_to_address     "127.0.0.1"
port                "6600"
# Log a syslog/journal (no a un archivo: evita problemas de permisos por-usuario).
log_file            "syslog"

# Re-escaneo automático de cambios en /music (import desde USB, etc.)
auto_update         "yes"
auto_update_depth   "0"

input {
    plugin "curl"
}

# Salida vía PipeWire (a través de su capa PulseAudio). PipeWire enruta al sink por
# defecto (analógica / HDMI / USB / Bluetooth), así que acá NO se fija placa: la
# elección de salida vive en PipeWire, no en MPD.
audio_output {
    type    "pulse"
    name    "PipeWire"
    mixer_type "software"
}

# Carátulas embebidas / archivos cover.* (lo usa la UI vía readpicture/albumart)
