<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!-- Rocola: permitir al grupo 'bluetooth' (al que pertenece el usuario 'rocola')
     gestionar BlueZ por D-Bus, así la rocola puede emparejar/confiar/conectar
     parlantes y auriculares desde la sesión de la UI (rocola-bt-pair) sin ser root.
     El acceso a org.bluez en bookworm se controla por política de D-Bus. -->
<busconfig>
  <policy group="bluetooth">
    <allow send_destination="org.bluez"/>
    <allow send_destination="org.bluez" send_interface="org.bluez.AgentManager1"/>
    <allow send_destination="org.bluez" send_interface="org.bluez.Agent1"/>
    <allow send_destination="org.bluez" send_interface="org.bluez.Adapter1"/>
    <allow send_destination="org.bluez" send_interface="org.bluez.Device1"/>
    <allow send_destination="org.bluez" send_interface="org.freedesktop.DBus.Properties"/>
    <allow send_destination="org.bluez" send_interface="org.freedesktop.DBus.ObjectManager"/>
  </policy>
</busconfig>
