# Bluetooth de la rocola — configuración mínima (el resto usa los defaults de bluez).
[General]
# Nombre que ven los dispositivos al emparejar.
Name = Rocola

[Policy]
# Encender el adaptador al arrancar y reconectar los dispositivos 'trusted' solos
# (un parlante ya emparejado se reconecta sin intervención al volver a encenderse).
AutoEnable=true
