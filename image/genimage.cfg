# genimage.cfg — configuración ALTERNATIVA/de referencia.
#
# build-image.sh arma la imagen directamente con losetup + grub-install (camino
# principal, más control sobre GRUB). Este archivo queda como referencia para
# quien prefiera el flujo `genimage` (no requiere loop para construir los FS,
# pero la instalación de GRUB BIOS igual necesita pasos extra).
#
# Espera, en el directorio de entrada, una carpeta con el contenido live:
#   input/EFI/BOOT/bootx64.efi
#   input/boot/grub/grub.cfg
#   input/live/{vmlinuz,initrd.img,filesystem.squashfs}

image rocola-i386.img {
    hdimage {
        partition-table-type = "gpt"
    }

    partition bios_grub {
        image = "bios-grub.img"
        partition-type-uuid = "21686148-6449-6E6F-744E-656564454649"
        size = 2M
    }

    partition esp {
        image = "esp.vfat"
        partition-type-uuid = "C12A7328-F81F-11D2-BA4B-00A0C93EC93B"
        bootable = "true"
    }
}

image esp.vfat {
    vfat {
        label = "ROCOLA"
        files = { "EFI", "boot", "live" }
    }
    size = 0   # 0 = ajustar al contenido (definir en el script según squashfs)
}
