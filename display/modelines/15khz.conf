# Modelines de 15 kHz para CRT de arcade / TV.
# Frecuencia horizontal ~15.7 kHz (NTSC) / ~15.6 kHz (PAL).
#
# IMPORTANTE: son valores TÍPICOS de referencia. Cada CRT varía; puede hacer
# falta ajustar timings/posición. Usá switchres para afinar por monitor.
# Estos modelines los inserta rocola-display-setup en la sección Monitor de Xorg.

# 320x240 @ ~60 Hz (progresivo, estilo NTSC) — ideal para la UI a baja resolución
    Modeline "320x240_60"   6.71  320 336 367 426   240 244 247 262   -hsync -vsync

# 640x480 @ ~60 Hz (entrelazado) — más detalle en CRT 15 kHz
    Modeline "640x480i_60" 13.50  640 672 736 858   480 484 487 525   interlace -hsync -vsync

# 384x288 @ ~50 Hz (progresivo, estilo PAL)
    Modeline "384x288_50"   7.00  384 400 432 506   288 292 295 312   -hsync -vsync

# 768x576 @ ~50 Hz (entrelazado, PAL)
    Modeline "768x576i_50" 14.75  768 800 872 944   576 581 584 625   interlace -hsync -vsync
